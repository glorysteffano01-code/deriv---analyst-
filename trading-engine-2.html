<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Math ─────────────────────────────────────────────────────────────────────
function sma(d,p){return d.map((_,i)=>i<p-1?null:d.slice(i-p+1,i+1).reduce((s,v)=>s+v,0)/p);}
function ema(d,p){
  const k=2/(p+1),r=[];let e=null;
  for(let i=0;i<d.length;i++){
    if(i<p-1){r.push(null);continue;}
    if(e===null){e=d.slice(0,p).reduce((s,v)=>s+v,0)/p;r.push(e);continue;}
    e=d[i]*k+e*(1-k);r.push(e);
  }
  return r;
}
function calcRSI(c,p=14){
  const r=Array(c.length).fill(null);
  if(c.length<p+1)return r;
  let g=0,l=0;
  for(let i=1;i<=p;i++){const d=c[i]-c[i-1];d>0?g+=d:l-=d;}
  let ag=g/p,al=l/p;
  r[p]=100-100/(1+ag/(al||1e-10));
  for(let i=p+1;i<c.length;i++){
    const d=c[i]-c[i-1];
    ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;
    r[i]=100-100/(1+ag/(al||1e-10));
  }
  return r;
}
function calcMACD(c,f=12,s=26,sg=9){
  const ef=ema(c,f),es=ema(c,s);
  const ml=c.map((_,i)=>ef[i]!=null&&es[i]!=null?ef[i]-es[i]:null);
  const raw=ema(ml.filter(v=>v!=null),sg);
  let si=0;
  const sl=ml.map(v=>v==null?null:(raw[si++]??null));
  const h=ml.map((v,i)=>v!=null&&sl[i]!=null?v-sl[i]:null);
  return{ml,sl,h};
}
function calcBoll(c,p=20,sd=2){
  const s=sma(c,p);
  return c.map((_,i)=>{
    if(s[i]==null)return{upper:null,mid:null,lower:null,bw:null};
    const sl=c.slice(i-p+1,i+1),m=s[i];
    const std=Math.sqrt(sl.reduce((s,v)=>s+(v-m)**2,0)/p);
    return{upper:m+sd*std,mid:m,lower:m-sd*std,bw:(sd*2*std)/m*100};
  });
}
function calcATR(cs,p=14){
  const tr=cs.map((c,i)=>{
    if(i===0)return c.high-c.low;
    const pv=cs[i-1];
    return Math.max(c.high-c.low,Math.abs(c.high-pv.close),Math.abs(c.low-pv.close));
  });
  return tr.map((_,i)=>i<p-1?null:tr.slice(i-p+1,i+1).reduce((s,v)=>s+v,0)/p);
}
function calcStoch(cs,kp=14,dp=3){
  const k=cs.map((_,i)=>{
    if(i<kp-1)return null;
    const sl=cs.slice(i-kp+1,i+1);
    const hi=Math.max(...sl.map(c=>c.high)),lo=Math.min(...sl.map(c=>c.low));
    return hi===lo?50:(cs[i].close-lo)/(hi-lo)*100;
  });
  const d=k.map((_,i)=>{
    const v=k.slice(Math.max(0,i-dp+1),i+1).filter(v=>v!=null);
    return v.length===dp?v.reduce((s,v)=>s+v,0)/dp:null;
  });
  return{k,d};
}

// ── Signal Engine ─────────────────────────────────────────────────────────────
function analyze(candles,stake=30){
  if(candles.length<30)return null;
  const closes=candles.map(c=>c.close);
  const rsiV=calcRSI(closes);
  const {ml,sl:sigL,h:hist}=calcMACD(closes);
  const bollV=calcBoll(closes);
  const atrV=calcATR(candles);
  const {k:stK,d:stD}=calcStoch(candles);
  const e9=ema(closes,9),e20=ema(closes,20),e50=ema(closes,Math.min(50,closes.length-1));
  const i=closes.length-1;
  const price=closes[i];
  const lRSI=rsiV[i],lBoll=bollV[i],lATR=atrV[i];
  const lML=ml[i],lSL=sigL[i],lH=hist[i],pH=hist[i-1];
  const lStK=stK[i],lStD=stD[i];
  const lE9=e9[i],lE20=e20[i],lE50=e50[i];
  if(!lRSI||!lBoll.upper||!lATR||!lML||!lStK||!lE20)return null;

  const trendUp=lE9>lE20&&lE20>(lE50||0);
  const trendDown=lE9<lE20&&lE20<(lE50||price);
  const recentH=candles.slice(-20).map(c=>c.high);
  const recentL=candles.slice(-20).map(c=>c.low);
  const resist=Math.max(...recentH),supp=Math.min(...recentL);
  const nearSupp=price<supp+(resist-supp)*0.15;
  const nearResist=price>resist-(resist-supp)*0.15;
  const bwPct=lBoll.bw||0;
  const isSqueeze=bwPct<2.5;
  const isExpanding=bwPct>5;

  let buyS=0,sellS=0,sigs=[];

  // RSI
  if(lRSI<22){buyS+=35;sigs.push({n:"RSI Deeply Oversold",t:"BUY",s:"STRONG",v:lRSI.toFixed(1)});}
  else if(lRSI<32){buyS+=20;sigs.push({n:"RSI Oversold",t:"BUY",s:"MEDIUM",v:lRSI.toFixed(1)});}
  else if(lRSI<42){buyS+=8;sigs.push({n:"RSI Below Mid",t:"BUY",s:"WEAK",v:lRSI.toFixed(1)});}
  else if(lRSI>78){sellS+=35;sigs.push({n:"RSI Deeply Overbought",t:"SELL",s:"STRONG",v:lRSI.toFixed(1)});}
  else if(lRSI>68){sellS+=20;sigs.push({n:"RSI Overbought",t:"SELL",s:"MEDIUM",v:lRSI.toFixed(1)});}
  else if(lRSI>58){sellS+=8;sigs.push({n:"RSI Above Mid",t:"SELL",s:"WEAK",v:lRSI.toFixed(1)});}

  // MACD
  if(lH!=null&&pH!=null){
    if(lH>0&&pH<=0){buyS+=28;sigs.push({n:"MACD Bullish Cross",t:"BUY",s:"STRONG",v:"New cross"});}
    else if(lH<0&&pH>=0){sellS+=28;sigs.push({n:"MACD Bearish Cross",t:"SELL",s:"STRONG",v:"New cross"});}
    else if(lH>0&&lH>pH){buyS+=12;sigs.push({n:"MACD Rising",t:"BUY",s:"WEAK",v:"Momentum up"});}
    else if(lH<0&&lH<pH){sellS+=12;sigs.push({n:"MACD Falling",t:"SELL",s:"WEAK",v:"Momentum down"});}
  }

  // Bollinger
  if(price<=lBoll.lower){buyS+=28;sigs.push({n:"Price at BB Lower",t:"BUY",s:"STRONG",v:"Lower band touch"});}
  else if(price>=lBoll.upper){sellS+=28;sigs.push({n:"Price at BB Upper",t:"SELL",s:"STRONG",v:"Upper band touch"});}
  else if(price<lBoll.mid){buyS+=8;}
  else{sellS+=8;}

  // EMA Trend
  if(trendUp){buyS+=22;sigs.push({n:"EMA Bullish Stack",t:"BUY",s:"STRONG",v:"9>20>50"});}
  else if(trendDown){sellS+=22;sigs.push({n:"EMA Bearish Stack",t:"SELL",s:"STRONG",v:"9<20<50"});}

  // Stochastic
  if(lStK<20&&lStD!=null&&lStK>lStD){buyS+=22;sigs.push({n:"Stoch Oversold Cross",t:"BUY",s:"STRONG",v:`K:${lStK.toFixed(0)} D:${lStD.toFixed(0)}`});}
  else if(lStK>80&&lStD!=null&&lStK<lStD){sellS+=22;sigs.push({n:"Stoch Overbought Cross",t:"SELL",s:"STRONG",v:`K:${lStK.toFixed(0)} D:${lStD.toFixed(0)}`});}

  // Support/Resistance
  if(nearSupp){buyS+=18;sigs.push({n:"Near Key Support",t:"BUY",s:"STRONG",v:supp.toFixed(2)});}
  if(nearResist){sellS+=18;sigs.push({n:"Near Key Resistance",t:"SELL",s:"STRONG",v:resist.toFixed(2)});}

  // Squeeze
  if(isSqueeze)sigs.push({n:"BB Squeeze",t:"ALERT",s:"ALERT",v:"Breakout coming"});

  const dir=buyS>=sellS?"BUY":"SELL";
  const total=buyS+sellS||1;
  const conf=Math.min(95,Math.max(30,Math.round(Math.max(buyS,sellS)/total*100)));

  let eType="";
  if((trendUp&&dir==="BUY")||(trendDown&&dir==="SELL"))eType="TREND FOLLOW";
  else if((nearSupp&&dir==="BUY")||(nearResist&&dir==="SELL"))eType="REVERSAL";
  else if(isExpanding)eType="BREAKOUT";
  else eType="REVERSAL";

  const spread=price*0.0002;
  const entry=dir==="BUY"?price+spread:price-spread;
  const mult=conf>70?1.5:2.0;
  const stopL=dir==="BUY"?entry-lATR*mult:entry+lATR*mult;
  const tp1=dir==="BUY"?entry+lATR*2:entry-lATR*2;
  const tp2=dir==="BUY"?entry+lATR*3.5:entry-lATR*3.5;
  const tp3=dir==="BUY"?entry+lATR*5:entry-lATR*5;
  const rr=Math.abs(tp1-entry)/Math.abs(entry-stopL);
  const sugStake=Math.max(stake*0.4,Math.min(stake,stake*conf/100));
  const wait=conf<52||isSqueeze;

  return{dir,conf,eType,entry,stopL,tp1,tp2,tp3,rr,sugStake,sigs,wait,isSqueeze,
    lRSI,lStK,lStD:lStD??0,lBoll,lATR,supp,resist,bwPct,
    trendUp,trendDown,price,lE9,lE20,lE50:lE50??price,lML,lSL,lH,buyS,sellS};
}

// ── Markets ───────────────────────────────────────────────────────────────────
const MARKETS=[
  {id:"v75",  label:"V75",    full:"Volatility 75",    type:"SYN",base:1200, vol:0.018,color:"#00e59b"},
  {id:"v25",  label:"V25",    full:"Volatility 25",    type:"SYN",base:5200, vol:0.010,color:"#00aaff"},
  {id:"v10",  label:"V10",    full:"Volatility 10",    type:"SYN",base:9800, vol:0.006,color:"#a78bfa"},

];

function genCandles(base,count=80,vol=0.012){
  const cs=[],now=Date.now();let pr=base,trend=0,tLen=0;
  for(let i=count;i>=0;i--){
    if(tLen<=0){trend=(Math.random()-0.5)*0.006;tLen=Math.floor(Math.random()*12)+4;}
    tLen--;
    const o=pr,mv=(trend+(Math.random()-0.5)*vol)*pr,c=o+mv;
    const rng=Math.abs(mv)*(1.5+Math.random());
    cs.push({time:new Date(now-i*5*60000),open:o,high:Math.max(o,c)+rng*0.3,low:Math.min(o,c)-rng*0.3,close:c});
    pr=c;
  }
  return cs;
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function Chart({candles,an}){
  if(!candles.length)return null;
  const W=560,H=200,pad={l:52,r:12,t:10,b:24};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const show=candles.slice(-50);
  const closes=show.map(c=>c.close);
  const bollV=calcBoll(closes);
  const e9v=ema(closes,Math.min(9,closes.length));
  const e20v=ema(closes,Math.min(20,closes.length));
  const prices=show.flatMap(c=>[c.high,c.low]);
  const bPx=bollV.flatMap(b=>b.upper!=null?[b.upper,b.lower]:[]);
  const extra=an?[an.tp1,an.stopL,an.entry].filter(v=>v>0):[];
  const all=[...prices,...bPx,...extra];
  const minP=Math.min(...all),maxP=Math.max(...all),pr=maxP-minP||1;
  const sy=v=>pad.t+ch-((v-minP)/pr)*ch,sx=i=>pad.l+(i/(show.length-1))*cw;
  const cw2=Math.max(2,cw/show.length*0.65);
  const xStep=Math.max(1,Math.floor(show.length/5));
  const linePath=arr=>arr.map((v,i)=>v==null?"":`${i===0||arr[i-1]==null?"M":"L"} ${sx(i)} ${sy(v)}`).join(" ");
  const bUp=bollV.map((b,i)=>b.upper!=null?`${sx(i)},${sy(b.upper)}`:null).filter(Boolean);
  const bLo=bollV.map((b,i)=>b.lower!=null?`${sx(i)},${sy(b.lower)}`:null).filter(Boolean).reverse();
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
      {[0,0.25,0.5,0.75,1].map((t,i)=>{
        const v=minP+pr*t;
        return<g key={i}><line x1={pad.l} y1={sy(v)} x2={W-pad.r} y2={sy(v)} stroke="#0e2235" strokeWidth="1"/><text x={pad.l-4} y={sy(v)+4} textAnchor="end" fill="#2a3f55" fontSize="8" fontFamily="monospace">{v.toFixed(v>10?1:4)}</text></g>;
      })}
      {bUp.length&&<><path d={`M ${bUp.join(" L ")} L ${bLo.join(" L ")} Z`} fill="rgba(0,170,255,0.05)"/><path d={linePath(bollV.map(b=>b.upper))} fill="none" stroke="rgba(0,170,255,0.35)" strokeWidth="0.8" strokeDasharray="3,2"/><path d={linePath(bollV.map(b=>b.lower))} fill="none" stroke="rgba(0,170,255,0.35)" strokeWidth="0.8" strokeDasharray="3,2"/><path d={linePath(bollV.map(b=>b.mid))} fill="none" stroke="rgba(0,170,255,0.2)" strokeWidth="0.8"/></>}
      <path d={linePath(e20v)} fill="none" stroke="#f0c040" strokeWidth="1" opacity="0.7"/>
      <path d={linePath(e9v)} fill="none" stroke="#00aaff" strokeWidth="1" opacity="0.8"/>
      {show.map((c,i)=>{
        const x=sx(i),up=c.close>=c.open,col=up?"#00e59b":"#ff4d6d";
        const bt=sy(Math.max(c.open,c.close)),bb=sy(Math.min(c.open,c.close));
        return<g key={i}><line x1={x} y1={sy(c.high)} x2={x} y2={sy(c.low)} stroke={col} strokeWidth="0.8" opacity="0.9"/><rect x={x-cw2/2} y={bt} width={cw2} height={Math.max(1,bb-bt)} fill={col} opacity="0.9"/></g>;
      })}
      {an&&an.entry>=minP&&an.entry<=maxP&&<><line x1={pad.l} y1={sy(an.entry)} x2={W-pad.r} y2={sy(an.entry)} stroke={an.dir==="BUY"?"#00e59b":"#ff4d6d"} strokeWidth="1.5" strokeDasharray="5,3"/><text x={W-pad.r} y={sy(an.entry)-3} textAnchor="end" fill={an.dir==="BUY"?"#00e59b":"#ff4d6d"} fontSize="8" fontFamily="monospace">ENTRY</text></>}
      {an&&an.tp1>=minP&&an.tp1<=maxP&&<><line x1={pad.l} y1={sy(an.tp1)} x2={W-pad.r} y2={sy(an.tp1)} stroke="#00e59b" strokeWidth="1" strokeDasharray="3,3" opacity="0.7"/><text x={W-pad.r} y={sy(an.tp1)-3} textAnchor="end" fill="#00e59b" fontSize="8" fontFamily="monospace">TP1</text></>}
      {an&&an.stopL>=minP&&an.stopL<=maxP&&<><line x1={pad.l} y1={sy(an.stopL)} x2={W-pad.r} y2={sy(an.stopL)} stroke="#ff4d6d" strokeWidth="1" strokeDasharray="3,3" opacity="0.7"/><text x={W-pad.r} y={sy(an.stopL)+10} textAnchor="end" fill="#ff4d6d" fontSize="8" fontFamily="monospace">SL</text></>}
      {show.filter((_,i)=>i%xStep===0).map((c,i)=>(
        <text key={i} x={sx(i*xStep)} y={H-4} textAnchor="middle" fill="#2a3f55" fontSize="8" fontFamily="monospace">{c.time.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</text>
      ))}
      <text x={pad.l+4} y={pad.t+10} fill="#f0c040" fontSize="8" fontFamily="monospace">EMA20</text>
      <text x={pad.l+44} y={pad.t+10} fill="#00aaff" fontSize="8" fontFamily="monospace">EMA9</text>
    </svg>
  );
}

// ── Confidence Arc ─────────────────────────────────────────────────────────────
function Arc({val,dir}){
  const col=val>=70?"#00e59b":val>=52?"#f0c040":"#ff4d6d";
  const rad=a=>(a*Math.PI)/180,cx=65,cy=65,r=50;
  const ang=-180+(val/100)*180;
  const gx=cx+r*Math.cos(rad(ang)),gy=cy+r*Math.sin(rad(ang));
  return(
    <svg viewBox="0 0 130 80" style={{width:130}}>
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke="#0e2235" strokeWidth="10" strokeLinecap="round"/>
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${gx} ${gy}`} fill="none" stroke={col} strokeWidth="10" strokeLinecap="round" opacity="0.9"/>
      <circle cx={gx} cy={gy} r={6} fill={col}/>
      <text x={cx} y={cy-10} textAnchor="middle" fill={col} fontSize="20" fontWeight="700" fontFamily="monospace">{val}%</text>
      <text x={cx} y={cy+6} textAnchor="middle" fill={col} fontSize="9" fontWeight="700" fontFamily="monospace" letterSpacing="2">{dir}</text>
    </svg>
  );
}

// ── Entry Signal Card ─────────────────────────────────────────────────────────
function EntryCard({an,market,stake}){
  if(!an)return(<div style={{padding:40,textAlign:"center",color:"#2a3f55",fontSize:12}}>Add 30+ candles to activate engine</div>);
  const fmt=v=>v.toFixed(v>10?2:5);
  const col=an.dir==="BUY"?"#00e59b":"#ff4d6d";

  if(an.isSqueeze)return(
    <div style={{padding:20,textAlign:"center"}}>
      <div style={{fontSize:36,marginBottom:10}}>🔥</div>
      <div style={{color:"#00aaff",fontSize:15,fontWeight:700,marginBottom:8}}>SQUEEZE DETECTED</div>
      <div style={{color:"#4a6080",fontSize:11,lineHeight:1.8,marginBottom:16}}>Bollinger Bands are very tight. A major breakout move is building up. Watch price closely and enter in the direction of the first strong candle break.</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div style={{background:"rgba(0,229,155,0.08)",border:"1px solid #00e59b30",borderRadius:6,padding:10}}>
          <div style={{color:"#4a6080",fontSize:9,marginBottom:4}}>BREAK UP → TARGET</div>
          <div style={{color:"#00e59b",fontSize:14,fontWeight:700}}>{fmt(an.resist)}</div>
        </div>
        <div style={{background:"rgba(255,77,109,0.08)",border:"1px solid #ff4d6d30",borderRadius:6,padding:10}}>
          <div style={{color:"#4a6080",fontSize:9,marginBottom:4}}>BREAK DOWN → TARGET</div>
          <div style={{color:"#ff4d6d",fontSize:14,fontWeight:700}}>{fmt(an.supp)}</div>
        </div>
      </div>
    </div>
  );

  if(an.wait)return(
    <div style={{padding:30,textAlign:"center"}}>
      <div style={{fontSize:36,marginBottom:10}}>⏳</div>
      <div style={{color:"#f0c040",fontSize:14,fontWeight:700,marginBottom:8}}>WAIT — No Clear Entry</div>

          5. Close trade if price hits SL: <strong style={{color:"#ff4d6d"}}>{fmt(an.stopL)}</strong><br/>
          6. Take profit at TP1: <strong style={{color:"#00e59b"}}>{fmt(an.tp1)}</strong><br/>
          7. Let rest run to TP2: <strong style={{color:"#00aaff"}}>{fmt(an.tp2)}</strong>

      {/* Warning */}

// ── Manual Candle Form ────────────────────────────────────────────────────────
function CandleForm({onAdd,lastClose}){
  const [f,setF]=useState({o:lastClose.toFixed(2),h:"",l:"",c:""});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const submit=()=>{
    const o=+f.o,h=+f.h,l=+f.l,c=+f.c;
    if(!o||!h||!l||!c)return;
    if(h<Math.max(o,c)||l>Math.min(o,c)){alert("High >= max(O,C) and Low <= min(O,C)");return;}
    onAdd({open:o,high:h,low:l,close:c,time:new Date()});
    setF({o:c.toFixed(2),h:"",l:"",c:""});
  };
  const inp={background:"#060f1a",border:"1px solid #1e2d3d",borderRadius:4,color:"#c8ddf0",padding:"6px 8px",width:"100%",fontSize:12,outline:"none"};
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:8}}>
        {[["o","Open"],["h","High"],["l","Low"],["c","Close"]].map(([k,lb])=>(
          <div key={k}>
            <div style={{color:"#2a3f55",fontSize:9,marginBottom:3,textTransform:"uppercase"}}>{lb}</div>
            <input style={inp} value={f[k]} onChange={e=>set(k,e.target.value)} type="number" step="any" placeholder="0.00"/>
          </div>
        ))}
      </div>
      <button onClick={submit} style={{width:"100%",background:"linear-gradient(135deg,#00e59b,#00aaff)",border:"none",borderRadius:4,color:"#000",padding:"8px",fontWeight:700,cursor:"pointer",fontSize:12}}>+ ADD CANDLE</button>
    </div>
  );
}

// ── MT5 Calculator ────────────────────────────────────────────────────────────
const MT5_INSTRUMENTS=[
  {id:"v75",  label:"Volatility 75 Index",   pipSize:0.01,  pipVal:0.10,  contractSize:1,    minLot:0.001,maxLot:10,  stepLot:0.001,type:"SYN"},
  {id:"v25",  label:"Volatility 25 Index",   pipSize:0.001, pipVal:0.10,  contractSize:1,    minLot:0.001,maxLot:10,  stepLot:0.001,type:"SYN"},
  {id:"v10",  label:"Volatility 10 Index",   pipSize:0.001, pipVal:0.10,  contractSize:1,    minLot:0.001,maxLot:10,  stepLot:0.001,type:"SYN"},
  {id:"v50",  label:"Volatility 50 Index",   pipSize:0.01,  pipVal:0.10,  contractSize:1,    minLot:0.001,maxLot:10,  stepLot:0.001,type:"SYN"},
  {id:"v100", label:"Volatility 100 Index",  pipSize:0.01,  pipVal:0.10,  contractSize:1,    minLot:0.001,maxLot:10,  stepLot:0.001,type:"SYN"},
  {id:"cr1k", label:"Crash 1000 Index",      pipSize:0.01,  pipVal:0.10,  contractSize:1,    minLot:0.001,maxLot:10,  stepLot:0.001,type:"SYN"},
  {id:"bm1k", label:"Boom 1000 Index",       pipSize:0.01,  pipVal:0.10,  contractSize:1,    minLot:0.001,maxLot:10,  stepLot:0.001,type:"SYN"},
  {id:"cr500",label:"Crash 500 Index",       pipSize:0.01,  pipVal:0.10,  contractSize:1,    minLot:0.001,maxLot:10,  stepLot:0.001,type:"SYN"},
  {id:"bm500",label:"Boom 500 Index",        pipSize:0.01,  pipVal:0.10,  contractSize:1,    minLot:0.001,maxLot:10,  stepLot:0.001,type:"SYN"},
  {id:"eu",   label:"EUR/USD",               pipSize:0.0001,pipVal:10.00, contractSize:100000,minLot:0.01, maxLot:100, stepLot:0.01, type:"FX"},
  {id:"gu",   label:"GBP/USD",               pipSize:0.0001,pipVal:10.00, contractSize:100000,minLot:0.01, maxLot:100, stepLot:0.01, type:"FX"},
  {id:"uj",   label:"USD/JPY",               pipSize:0.01,  pipVal:9.20,  contractSize:100000,minLot:0.01, maxLot:100, stepLot:0.01, type:"FX"},
  {id:"au",   label:"AUD/USD",               pipSize:0.0001,pipVal:10.00, contractSize:100000,minLot:0.01, maxLot:100, stepLot:0.01, type:"FX"},
];

function MT5Calc({an,mkt}){
  const matchedInst=MT5_INSTRUMENTS.find(i=>i.id===mkt.id)||MT5_INSTRUMENTS[0];
  const [inst,setInst]=useState(matchedInst.id);
  const [balance,setBalance]=useState(500);
  const [riskPct,setRiskPct]=useState(2);
  const [entryP,setEntryP]=useState(an?an.entry.toFixed(2):"");
  const [slP,setSlP]=useState(an?an.stopL.toFixed(2):"");
  const [tp1P,setTp1P]=useState(an?an.tp1.toFixed(2):"");
  const [tp2P,setTp2P]=useState(an?an.tp2.toFixed(2):"");
  const [dir,setDir]=useState(an?an.dir:"BUY");

  // Auto-fill from engine signal when tab loads
  useEffect(()=>{
    if(an){
      setEntryP(an.entry.toFixed(an.price>10?2:5));
      setSlP(an.stopL.toFixed(an.price>10?2:5));
      setTp1P(an.tp1.toFixed(an.price>10?2:5));
      setTp2P(an.tp2.toFixed(an.price>10?2:5));
      setDir(an.dir);
      const m=MT5_INSTRUMENTS.find(i=>i.id===mkt.id);
      if(m)setInst(m.id);
    }
  },[an,mkt]);

  const selInst=MT5_INSTRUMENTS.find(i=>i.id===inst)||MT5_INSTRUMENTS[0];
  const entry=parseFloat(entryP)||0;
  const sl=parseFloat(slP)||0;
  const tp1=parseFloat(tp1P)||0;
  const tp2=parseFloat(tp2P)||0;

  // Core calculations
  const slPips=entry&&sl?Math.abs(entry-sl)/selInst.pipSize:0;
  const tp1Pips=entry&&tp1?Math.abs(tp1-entry)/selInst.pipSize:0;
  const tp2Pips=entry&&tp2?Math.abs(tp2-entry)/selInst.pipSize:0;
  const riskAmount=(balance*riskPct)/100;
  const lotSize=slPips>0&&selInst.pipVal>0?riskAmount/(slPips*selInst.pipVal):0;
  const adjLot=Math.max(selInst.minLot,Math.min(selInst.maxLot,Math.round(lotSize/selInst.stepLot)*selInst.stepLot));
  const actualRisk=adjLot*slPips*selInst.pipVal;
  const tp1Profit=adjLot*tp1Pips*selInst.pipVal;
  const tp2Profit=adjLot*tp2Pips*selInst.pipVal;
  const rr1=actualRisk>0?tp1Profit/actualRisk:0;
  const rr2=actualRisk>0?tp2Profit/actualRisk:0;
  const marginNeeded=selInst.type==="FX"?adjLot*selInst.contractSize*entry/100:adjLot*entry*0.01;

  const inp={background:"#060f1a",border:"1px solid #1e2d3d",borderRadius:4,color:"#c8ddf0",padding:"7px 10px",width:"100%",fontSize:12,outline:"none"};
  const lbl={color:"#4a6080",fontSize:9,textTransform:"uppercase",letterSpacing:1,marginBottom:3,display:"block"};
  const col=dir==="BUY"?"#00e59b":"#ff4d6d";

  return(
    <div>
      {/* Auto-fill notice */}
      {an&&<div style={{background:"rgba(0,229,155,0.05)",border:"1px solid rgba(0,229,155,0.2)",borderRadius:6,padding:"8px 12px",marginBottom:14,fontSize:10,color:"#00e59b"}}>
        ✓ Auto-filled from engine signal — {mkt.full} · {an.dir} · Confidence {an.conf}%
      </div>}

      {/* Instrument selector */}
      <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:14,marginBottom:12}}>
        <div style={{color:"#4a6080",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Select Instrument</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
          <div>
            <label style={lbl}>Instrument</label>
            <select style={{...inp,cursor:"pointer"}} value={inst} onChange={e=>setInst(e.target.value)}>
              <optgroup label="── SYNTHETIC ──">
                {MT5_INSTRUMENTS.filter(i=>i.type==="SYN").map(i=><option key={i.id} value={i.id}>{i.label}</option>)}
              </optgroup>
              <optgroup label="── FOREX ──">
                {MT5_INSTRUMENTS.filter(i=>i.type==="FX").map(i=><option key={i.id} value={i.id}>{i.label}</option>)}
              </optgroup>
            </select>
          </div>
          <div>
            <label style={lbl}>Direction</label>
            <select style={{...inp,cursor:"pointer",color:dir==="BUY"?"#00e59b":"#ff4d6d",fontWeight:700}} value={dir} onChange={e=>setDir(e.target.value)}>
              <option value="BUY">BUY (Rise)</option>
              <option value="SELL">SELL (Fall)</option>
            </select>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontSize:10}}>
          {[
            {lb:"Pip Size",v:selInst.pipSize},
            {lb:"Pip Value ($)",v:"$"+selInst.pipVal.toFixed(2)},
            {lb:"Min Lot",v:selInst.minLot},
          ].map(({lb,v})=>(
            <div key={lb} style={{background:"#060f1a",border:"1px solid #0e2235",borderRadius:5,padding:"6px 8px"}}>
              <div style={{color:"#2a3f55",fontSize:9,marginBottom:2}}>{lb}</div>
              <div style={{color:"#8aa0b8",fontWeight:700}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Price levels */}
      <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:14,marginBottom:12}}>
        <div style={{color:"#4a6080",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Price Levels (from MT5 chart)</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div>
            <label style={{...lbl,color:col}}>Entry Price</label>
            <input style={{...inp,borderColor:col+"50"}} type="number" step="any" value={entryP} onChange={e=>setEntryP(e.target.value)} placeholder="e.g. 1198.50"/>
          </div>
          <div>
            <label style={{...lbl,color:"#ff4d6d"}}>Stop Loss</label>
            <input style={{...inp,borderColor:"#ff4d6d50"}} type="number" step="any" value={slP} onChange={e=>setSlP(e.target.value)} placeholder="e.g. 1185.00"/>
          </div>
          <div>
            <label style={{...lbl,color:"#00e59b"}}>Take Profit 1</label>
            <input style={{...inp,borderColor:"#00e59b50"}} type="number" step="any" value={tp1P} onChange={e=>setTp1P(e.target.value)} placeholder="e.g. 1220.00"/>
          </div>
          <div>
            <label style={{...lbl,color:"#00aaff"}}>Take Profit 2</label>
            <input style={{...inp,borderColor:"#00aaff50"}} type="number" step="any" value={tp2P} onChange={e=>setTp2P(e.target.value)} placeholder="e.g. 1240.00"/>
          </div>
        </div>
      </div>

      {/* Account settings */}
      <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:14,marginBottom:12}}>
        <div style={{color:"#4a6080",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Account Settings</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div>
            <label style={lbl}>Account Balance ($)</label>
            <input style={inp} type="number" value={balance} onChange={e=>setBalance(+e.target.value||500)} placeholder="500"/>
          </div>
          <div>
            <label style={lbl}>Risk per Trade (%)</label>
            <div style={{display:"flex",gap:4}}>
              {[1,2,3,5].map(v=>(
                <button key={v} onClick={()=>setRiskPct(v)} style={{flex:1,padding:"7px 0",borderRadius:4,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:riskPct===v?"linear-gradient(135deg,#00e59b,#00aaff)":"#060f1a",color:riskPct===v?"#000":"#4a6080"}}>
                  {v}%
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Results */}
      {entry>0&&sl>0&&slPips>0?(
        <div>
          {/* Main result */}
          <div style={{background:col+"0d",border:`2px solid ${col}40`,borderRadius:8,padding:16,marginBottom:12,textAlign:"center"}}>

// ── Candle Forecast Engine ────────────────────────────────────────────────────
function forecastCandles(candles, count=10){
  if(candles.length<30) return null;
  const closes=candles.map(c=>c.close);
  const highs=candles.map(c=>c.high);
  const lows=candles.map(c=>c.low);
  const rsiV=calcRSI(closes);
  const {ml,sl:sigL,h:hist}=calcMACD(closes);
  const bollV=calcBoll(closes);
  const atrV=calcATR(candles);
  const {k:stK}=calcStoch(candles);
  const e9=ema(closes,9),e20=ema(closes,20);
  const last=closes.length-1;
  const lATR=atrV[last]||1;
  const lRSI=rsiV[last]||50;
  const lBoll=bollV[last];
  const lE9=e9[last],lE20=e20[last];
  const lH=hist[last],pH=hist[last-1];
  const lStK=stK[last]||50;
  const price=closes[last];

  // Momentum score: positive = bullish, negative = bearish
  let momentum=0;
  if(lE9>lE20) momentum+=2; else momentum-=2;
  if(lRSI>50) momentum+=1; else momentum-=1;
  if(lH!=null&&lH>0) momentum+=2; else if(lH!=null) momentum-=2;
  if(lBoll.mid&&price>lBoll.mid) momentum+=1; else momentum-=1;
  if(lStK>50) momentum+=1; else momentum-=1;

  // Recent candle bias (last 5 candles direction)
  const recent5=candles.slice(-5);
  const bullCandles=recent5.filter(c=>c.close>c.open).length;
  const bearCandles=5-bullCandles;
  if(bullCandles>bearCandles) momentum+=1.5; else momentum-=1.5;

  // Velocity: rate of change over last 3 candles
  const velocity=(closes[last]-closes[last-3])/closes[last-3]*100;

  // Decay factor — further candles are less certain
  const forecasts=[];
  let runningMomentum=momentum;
  let runningPrice=price;

  for(let i=1;i<=count;i++){
    // Momentum decays slightly each candle
    const decay=0.85;
    runningMomentum*=decay;

    // Add slight mean reversion pressure
    if(lBoll.upper&&lBoll.lower){
      const pctB=(runningPrice-lBoll.lower)/(lBoll.upper-lBoll.lower);
      if(pctB>0.8) runningMomentum-=0.5;
      if(pctB<0.2) runningMomentum+=0.5;
    }

    const dir=runningMomentum>=0?"BUY":"SELL";
    const absMom=Math.abs(runningMomentum);
    const rawConf=Math.min(92,Math.max(35,50+absMom*6));
    const conf=Math.round(rawConf);

    // Estimated price move
    const movePct=(absMom/10)*lATR;
    const estClose=dir==="BUY"?runningPrice+movePct:runningPrice-movePct;

    // Time: each candle = 5 mins
    const mins=i*5;
    const timeLabel=mins>=60?`${Math.floor(mins/60)}h${mins%60>0?mins%60+"m":""}`:`${mins}m`;

    forecasts.push({
      candle:i,
      dir,
      conf,
      timeLabel,
      estPrice:estClose,
      strong:conf>=70,
    });

    runningPrice=estClose;
  }

  // Overall bias for 15min (3 candles) and 30min (6 candles)
  const next3=forecasts.slice(0,3);
  const next6=forecasts.slice(0,6);
  const bias3=next3.filter(f=>f.dir==="BUY").length>next3.filter(f=>f.dir==="SELL").length?"BUY":"SELL";
  const bias6=next6.filter(f=>f.dir==="BUY").length>next6.filter(f=>f.dir==="SELL").length?"BUY":"SELL";
  const conf3=Math.round(next3.reduce((s,f)=>s+f.conf,0)/3);
  const conf6=Math.round(next6.reduce((s,f)=>s+f.conf,0)/6);

  // Best entry window — first candle where 3 consecutive agree
  let bestEntry=null;
  for(let i=0;i<forecasts.length-2;i++){
    if(forecasts[i].dir===forecasts[i+1].dir&&forecasts[i+1].dir===forecasts[i+2].dir&&forecasts[i].conf>=60){
      bestEntry={candle:forecasts[i].candle,dir:forecasts[i].dir,time:forecasts[i].timeLabel};
      break;
    }
  }

  return{forecasts,bias3,bias6,conf3,conf6,bestEntry,velocity,momentum,price};
}

      <div style={{display:"flex",borderBottom:"2px solid #0e2235",padding:"0 14px",overflowX:"auto"}}>
        <button style={nb(tab==="signal")} onClick={()=>setTab("signal")}>SIGNAL</button>
        <button style={nb(tab==="forecast")} onClick={()=>setTab("forecast")}>📅 FORECAST</button>
        <button style={nb(tab==="chart")} onClick={()=>setTab("chart")}>CHART</button>
        <button style={nb(tab==="indicators")} onClick={()=>setTab("indicators")}>INDICATORS</button>
        <button style={nb(tab==="signals")} onClick={()=>setTab("signals")}>ALL SIGNALS</button>
        <button style={nb(tab==="input")} onClick={()=>setTab("input")}>INPUT DATA</button>
        <button style={nb(tab==="mt5")} onClick={()=>setTab("mt5")}>MT5 CALC</button>
      </div>

      <div style={{padding:"14px"}}>

        {/* FORECAST TAB */}
        {tab==="forecast"&&(
          <div>
            <ForecastPanel candles={candles} mkt={mkt}/>
          </div>
        )}

        {/* SIGNAL TAB */}
        {tab==="signal"&&(
          <div>
            <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:16,marginBottom:14}}>
              <EntryCard an={an} market={mkt} stake={stake}/>
            </div>
            {/* Stake setter */}
            <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:14}}>
              <div style={{color:"#4a6080",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Your Stake Size</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[10,20,30,40,50].map(v=>(
                  <button key={v} onClick={()=>setStake(v)} style={{padding:"6px 14px",borderRadius:4,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:stake===v?"linear-gradient(135deg,#00e59b,#00aaff)":v===stake?"#0e2235":"#0e2235",color:stake===v?"#000":"#4a6080"}}>
                    ${v}
                  </button>
                ))}
                <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:4}}>
                  <span style={{color:"#2a3f55",fontSize:10}}>Custom:</span>
                  <input type="number" value={stake} onChange={e=>setStake(+e.target.value||30)} style={{background:"#060f1a",border:"1px solid #1e2d3d",borderRadius:4,color:"#c8ddf0",padding:"5px 8px",width:60,fontSize:12,outline:"none"}}/>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* CHART TAB */}
        {tab==="chart"&&(
          <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{color:"#4a6080",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>{mkt.full} — 5M Chart</div>
              <div style={{fontSize:9,color:"#2a3f55"}}>{candles.length} candles · EMA9 <span style={{color:"#00aaff"}}>●</span> EMA20 <span style={{color:"#f0c040"}}>●</span> BB <span style={{color:"#00aaff"}}>- -</span></div>
            </div>
            <div style={{background:"#060f1a",borderRadius:6,overflow:"hidden",padding:"8px 4px"}}>
              <Chart candles={candles} an={an}/>
            </div>
            {an&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:10}}>
                {[
                  {lb:"Entry",v:an.entry.toFixed(an.price>10?2:5),c:an.dir==="BUY"?"#00e59b":"#ff4d6d"},
                  {lb:"TP1",v:an.tp1.toFixed(an.price>10?2:5),c:"#00e59b"},
                  {lb:"SL",v:an.stopL.toFixed(an.price>10?2:5),c:"#ff4d6d"},
                ].map(({lb,v,c})=>(
                  <div key={lb} style={{background:"#060f1a",border:"1px solid #0e2235",borderRadius:5,padding:"6px 8px",textAlign:"center"}}>
                    <div style={{color:"#2a3f55",fontSize:9,marginBottom:2}}>{lb}</div>
                    <div style={{color:c,fontSize:11,fontWeight:700}}>{v}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* INDICATORS TAB */}
        {tab==="indicators"&&(
          <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:14}}>
            <div style={{color:"#4a6080",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Live Indicator Readings</div>
            <IndicatorsPanel an={an}/>
          </div>
        )}

        {/* ALL SIGNALS TAB */}
        {tab==="signals"&&(
          <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{color:"#4a6080",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>Active Signals ({an?.sigs?.length||0})</div>
              {an&&<div style={{display:"flex",gap:8}}>
                <span style={{color:"#00e59b",fontSize:10}}>BUY: {an.buyS}pts</span>
                <span style={{color:"#ff4d6d",fontSize:10}}>SELL: {an.sellS}pts</span>
              </div>}
            </div>
            <SignalsList sigs={an?.sigs}/>
          </div>
        )}

        {/* INPUT TAB */}
        {tab==="input"&&(
          <div>
            <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:14,marginBottom:14}}>
              <div style={{color:"#4a6080",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Add Real Candle from Deriv</div>
              <div style={{color:"#2a3f55",fontSize:10,marginBottom:12}}>Copy Open/High/Low/Close from your Deriv chart and enter below</div>
              <CandleForm onAdd={addCandle} lastClose={candles.length?candles[candles.length-1].close:mkt.base}/>
              <div style={{marginTop:8,color:"#2a3f55",fontSize:10}}>{candles.length} candles loaded · Min needed: 30 · Current: {mkt.full}</div>
            </div>
            <div style={{background:"#0a1929",border:"1px solid #0e2235",borderRadius:8,padding:14}}>
              <div style={{color:"#4a6080",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Recent Candles</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                  <thead><tr style={{background:"#060f1a"}}>{["Time","Open","High","Low","Close"].map(h=><th key={h} style={{padding:"5px 8px",textAlign:"left",color:"#2a3f55",borderBottom:"1px solid #0e2235"}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {candles.slice(-8).reverse().map((c,i)=>{
                      const up=c.close>=c.open;
                      return(
                        <tr key={i} style={{background:i%2===0?"#060f1a":"transparent"}}>
                          <td style={{padding:"4px 8px",color:"#2a3f55"}}>{c.time.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</td>
                          <td style={{padding:"4px 8px",color:"#8aa0b8"}}>{c.open.toFixed(c.open>10?2:5)}</td>
                          <td style={{padding:"4px 8px",color:"#00e59b"}}>{c.high.toFixed(c.high>10?2:5)}</td>
                          <td style={{padding:"4px 8px",color:"#ff4d6d"}}>{c.low.toFixed(c.low>10?2:5)}</td>
                          <td style={{padding:"4px 8px",color:up?"#00e59b":"#ff4d6d",fontWeight:700}}>{c.close.toFixed(c.close>10?2:5)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* MT5 CALCULATOR TAB */}
        {tab==="mt5"&&(
          <div>
            {/* Header */}
            <div style={{background:"linear-gradient(135deg,#0a1929,#0d1f30)",border:"1px solid #1a3050",borderRadius:8,padding:14,marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:700,color:"#00e59b",marginBottom:4}}>MT5 Trading Calculator</div>
              <div style={{fontSize:11,color:"#4a6080"}}>Calculate exact lot size, risk, and pip values for your MT5 trades on Deriv</div>
            </div>

            {/* Lot Size Calculator */}
            <MT5Calc an={an} mkt={mkt}/>
          </div>
        )}

        {/* Disclaimer */}
        <div style={{marginTop:16,padding:"10px 14px",background:"rgba(255,77,109,0.04)",border:"1px solid rgba(255,77,109,0.15)",borderRadius:6}}>
          <span style={{color:"#ff4d6d",fontSize:10,fontWeight:700}}>⚠ DISCLAIMER: </span>
          <span style={{color:"#2a3f55",fontSize:10}}>This engine provides analysis only — not financial advice. Synthetic indices carry high risk. Never trade money you cannot afford to lose. Always use stop losses.</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
